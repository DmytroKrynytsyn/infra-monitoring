apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-otelcol
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      hostmetrics:
        collection_interval: 30s
        root_path: /hostfs
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          filesystem:
            exclude_mount_points:
              mount_points:
                - /dev
                - /sys
                - /proc
                - /run/k3s
                - /var/lib/kubelet
              match_type: strict
          network: {}
          processes: {}
      
      journald:
        # Switching to /run/log/journal as it is the default for volatile Debian logs
        directory: /run/log/journal
      
      filelog/system:
        include:
          - /var/log/syslog
          - /var/log/auth.log
          - /var/log/kern.log
        start_at: end

    processors:
      batch:
        timeout: 10s

      resourcedetection:
        detectors: [env, system]
        system:
          hostname_sources: [os]

      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.node.name
            - k8s.container.name
    
      attributes:
        actions:
          - key: node
            from_attribute: k8s.node.name
            action: insert
          - key: ip
            from_attribute: node.ip
            action: insert

    exporters:
      prometheusremotewrite:
        endpoint: http://infra-monitoring-victoriametrics.monitoring.svc.cluster.local:8428/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
        tls:
          insecure: true
      
      otlphttp/victorialogs:
        # Fixed the URL to the standard VictoriaLogs OTLP ingestion point
        endpoint: http://cluster.local
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [hostmetrics]
          processors: [resourcedetection, k8sattributes, attributes, batch]
          exporters: [prometheusremotewrite]
        
        logs/system:
          receivers: [journald, filelog/system]
          processors: [resourcedetection, k8sattributes, batch]
          exporters: [otlphttp/victorialogs]
