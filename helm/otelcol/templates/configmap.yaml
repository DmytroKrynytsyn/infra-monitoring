apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-otelcol
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      hostmetrics:
        collection_interval: 30s
        root_path: /hostfs
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          filesystem:
            exclude_mount_points:
              mount_points:
                - /dev
                - /sys
                - /proc
                - /run/k3s
                - /var/lib/kubelet
              match_type: strict
          network: {}
          processes: {}

    processors:
      batch:
        timeout: 10s

      resourcedetection:
        detectors: [env, system, k8snode]
        system:
          hostname_sources: [os]

      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.node.name
            - k8s.container.name

    exporters:
      prometheusremotewrite:
        endpoint: http://infra-monitoring-victoriametrics.monitoring.svc.cluster.local:8428/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [hostmetrics]
          processors: [resourcedetection, batch, k8sattributes]
          exporters: [prometheusremotewrite]