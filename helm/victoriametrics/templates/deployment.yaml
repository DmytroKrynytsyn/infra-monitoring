apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-monitoring-victoriametrics
  namespace: monitoring
  labels:
    app: infra-monitoring-victoriametrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra-monitoring-victoriametrics
  template:
    metadata:
      labels:
        app: infra-monitoring-victoriametrics
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: victoriametrics
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --storageDataPath=/storage
            - --retentionPeriod={{ .Values.retentionPeriod }}
            - --httpListenAddr=:{{ .Values.port }}
            - --memory.allowedPercent=60
            - --search.maxConcurrentRequests=4
          ports:
            - containerPort: {{ .Values.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: storage
              mountPath: /storage
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: infra-monitoring-victoriametrics