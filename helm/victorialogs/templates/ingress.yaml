apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infra-monitoring-victorialogs
  namespace: monitoring
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - victorialogs.local
  rules:
    - backendRefs:
        - name: infra-monitoring-victorialogs
          port: {{ .Values.service.port }}