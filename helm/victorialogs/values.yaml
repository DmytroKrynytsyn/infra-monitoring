image:
  repository: victoriametrics/victoria-logs
  tag: "v1.45.0"
  pullPolicy: IfNotPresent

nodeSelector:
  kubernetes.io/role: master

retentionPeriod: "30d"

port: 9428

storage:
  size: 10Gi
  storageClass: local-path

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

service:
  type: ClusterIP
  port: 9428