apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard.json: |
    {
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{ 
            "expr": "100 * (1 - avg by (instance) (rate(system_cpu_time{state='idle'}[5m])))",
            "legendFormat": "{{ "{{" }}instance{{ "}}" }}" 
          }]
        },
        {
          "id": 2,
          "title": "Memory Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{ 
            "expr": "100 * (system_memory_usage{state='used'} / (system_memory_usage{state='used'} + system_memory_usage{state='free'} + system_memory_usage{state='cached'}))",
            "legendFormat": "{{ "{{" }}instance{{ "}}" }}" 
          }]
        },
        {
          "id": 3,
          "title": "Disk Usage % (/)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{ 
            "expr": "100 * (system_filesystem_usage{mountpoint='/', state='used'} / system_filesystem_usage{mountpoint='/', state='total'})",
            "legendFormat": "{{ "{{" }}instance{{ "}}" }}" 
          }]
        },
        {
          "id": 4,
          "title": "System Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "VictoriaLogs" },
          "targets": [{ "expr": "*", "refId": "A" }],
          "options": { "showTime": true, "sortOrder": "Descending", "wrapLogMessages": true }
        }
      ],
      "schemaVersion": 38,
      "title": "Node Infrastructure",
      "version": 1
    }
