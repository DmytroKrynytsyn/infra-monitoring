apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard-infra
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard.json: |
    {
      "uid": "infra",
      "title": "Node Infrastructure",
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{
            "expr": "100 * (1 - avg by (node_name, node_ip) (rate(system_cpu_time_seconds_total{state='idle'}[1m])))",
            "legendFormat": "{{ \"{{\" }}node_name{{ \"}}\" }} ({{ \"{{\" }}node_ip{{ \"}}\" }})"
          }]
        }
      ],
      "schemaVersion": 38,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "10s",
      "version": 1
    }