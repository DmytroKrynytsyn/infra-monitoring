apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"

data:
  dashboard.json: |
    {{- `
    {
      "uid": "infra",
      "title": "Node Infrastructure",
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": {
            "defaults": { "min": 0, "max": 100, "unit": "percent" }
          },
          "targets": [
            {
              "expr": "100 * (1 - avg by (node_name, node_ip) (rate(system_cpu_time_seconds_total{state='idle'}[1m])))",
              "legendFormat": "{{`{{`}}node_name{{`}}`}} ({{`{{`}}node_ip{{`}}`}})"
            }
          ]
        },
        {
          "id": 2,
          "title": "Memory Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": {
            "defaults": { "min": 0, "max": 100, "unit": "percent" }
          },
          "targets": [
            {
              "expr": "100 * (system_memory_usage_bytes{state='used'} / on(node_name, node_ip) group_left sum by (node_name, node_ip) (system_memory_usage_bytes))",
              "legendFormat": "{{`{{`}}node_name{{`}}`}} ({{`{{`}}node_ip{{`}}`}})"
            }
          ]
        },
        {
          "id": 3,
          "title": "Disk Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": {
            "defaults": { "min": 0, "max": 100, "unit": "percent" }
          },
          "targets": [
            {
              "expr": "100 * (sum by (node_name, node_ip) (system_filesystem_usage_bytes{mountpoint='/', state='used'}) / on(node_name, node_ip) group_left sum by (node_name, node_ip) (system_filesystem_usage_bytes{mountpoint='/'}))",
              "legendFormat": "{{`{{`}}node_name{{`}}`}} ({{`{{`}}node_ip{{`}}`}})"
            }
          ]
        },
        {
          "id": 4,
          "title": "Network Traffic (Bytes/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": {
            "defaults": { "unit": "binbps" }
          },
          "targets": [
            {
              "expr": "sum by (node_name, node_ip, direction) (rate(system_network_io_bytes_total[1m]))",
              "legendFormat": "{{`{{`}}node_name{{`}}`}} - {{`{{`}}direction{{`}}`}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "System Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "VictoriaLogs"
          },
          "targets": [
            {
              "expr": "{layer=\"infra\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessages": true
          }
        }
      ],
      "schemaVersion": 38,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "10s",
      "version": 1
    }
    `}}