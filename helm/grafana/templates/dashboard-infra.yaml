apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard-infra
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard.json: |
    {{- `
    {
      "uid": "infra",
      "title": "cluster hosts",
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{
            "expr": "100 * (1 - avg by (host_name, host_ip) (rate(system_cpu_time_seconds_total{state='idle', purpose='kubernetes'}[1m])))",
            "legendFormat": "{{host_name}} ({{host_ip}})"
          }]
        },
        {
          "id": 2,
          "title": "Memory Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{
            "expr": "100 * (system_memory_usage_bytes{state='used', purpose='kubernetes'} / on(host_name, host_ip) group_left sum by (host_name, host_ip) (system_memory_usage_bytes{purpose='kubernetes'}))",
            "legendFormat": "{{host_name}} ({{host_ip}})"
          }]
        },
        {
          "id": 7,
          "title": "Load Average % of CPU capacity",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "unit": "percent" } },
          "targets": [{
            "expr": "100 * system_cpu_load_average_1m{purpose='kubernetes'} / on(host_name) count by (host_name) (system_cpu_time_seconds_total{state='idle', purpose='kubernetes'})",
            "legendFormat": "{{host_name}}"
          }]
        },
        {
          "id": 3,
          "title": "Disk Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{
            "expr": "100 * (sum by (host_name, host_ip) (system_filesystem_usage_bytes{mountpoint='/', state='used', purpose='kubernetes'}) / on(host_name, host_ip) group_left sum by (host_name, host_ip) (system_filesystem_usage_bytes{mountpoint='/', purpose='kubernetes'}))",
            "legendFormat": "{{host_name}} ({{host_ip}})"
          }]
        },
        {
          "id": 4,
          "title": "Network Traffic (Bytes/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "unit": "binbps" } },
          "targets": [{
            "expr": "sum by (host_name, host_ip, direction) (rate(system_network_io_bytes_total{purpose='kubernetes'}[1m]))",
            "legendFormat": "{{host_name}} - {{direction}}"
          }]
        },
        {
          "id": 6,
          "title": "Swap Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{
            "expr": "100 * (system_paging_usage_bytes{state='used', purpose='kubernetes'} / on(host_name) sum by (host_name) (system_paging_usage_bytes{purpose='kubernetes'}))",
            "legendFormat": "{{host_name}}"
          }]
        },
        {
          "id": 5,
          "title": "System Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "VictoriaLogs"
          },
          "targets": [{
            "expr": "{layer=\"infra\", purpose=\"kubernetes\"}",
            "refId": "A"
          }],
          "options": {
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessages": true
          }
        }
      ],
      "schemaVersion": 38,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "10s",
      "version": 1
    }
    `}}