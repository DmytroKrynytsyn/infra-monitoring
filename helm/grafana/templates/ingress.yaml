apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infra-monitoring-grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - grafana.local
  rules:
    - backendRefs:
        - name: infra-monitoring-grafana
          port: {{ .Values.service.port }}