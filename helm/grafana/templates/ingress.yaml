apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infra-monitoring-grafana
  namespace: monitoring
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infra-monitoring-grafana
                port:
                  number: {{ .Values.service.port }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: infra-monitoring-grafana-tls