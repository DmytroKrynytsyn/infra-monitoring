apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-config
  namespace: monitoring
data:
  grafana.ini: |
    [server]
    http_port = 3000

    [auth]
    disable_login_form = false

    [auth.anonymous]
    enabled = false

  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://infra-monitoring-victoriametrics.monitoring.svc.cluster.local:8428
        isDefault: true
        editable: false

      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://infra-monitoring-victorialogs.monitoring.svc.cluster.local:9428
        editable: false

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Homelab
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards