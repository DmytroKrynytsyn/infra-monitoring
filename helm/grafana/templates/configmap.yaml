apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-config
  namespace: monitoring
data:
  grafana.ini: |
    [server]
    http_port = 3000

    [plugins]
    # This ensures the plugin is recognized if pre-installed or via ENV
    allow_loading_unsigned_plugins = victoriametrics-logs-datasource

    [auth]
    disable_login_form = false

    [auth.anonymous]
    enabled = false

  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://infra-monitoring-victoriametrics.monitoring.svc.cluster.local:8428
        isDefault: true
        editable: false

      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        url: http://infra-monitoring-victoriametrics.monitoring.svc.cluster.local:8428
        editable: false

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: Homelab
        type: file
        options:
          path: /etc/grafana/provisioning/dashboards
