apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-config
  namespace: monitoring
data:
  grafana.ini: |
    [server]
    http_port = 3000

    [auth.anonymous]
    enabled = true
    org_role = Admin

    [plugins]
    allow_loading_unsigned_plugins = victoriametrics-logs-datasource

  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://infra-monitoring-victoriametrics.monitoring.svc.cluster.local:8428
        isDefault: true
        editable: true

      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        uid: VictoriaLogs
        access: proxy
        url: http://infra-monitoring-victorialogs.monitoring.svc.cluster.local:9428
        editable: true

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 10
        options:
          path: /etc/grafana/provisioning/dashboards