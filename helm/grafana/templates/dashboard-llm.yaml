apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard-llm
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard-llm.json: |
    {{- `
    {
      "uid": "llm",
      "title": "LLM - kbrain",
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "Inference Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "rate(ollama_request_duration_seconds_count[1m])",
            "legendFormat": "{{model}}"
          }]
        },
        {
          "id": 2,
          "title": "Inference Duration p95/p99 (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (model, le) (rate(ollama_request_duration_seconds_bucket[1m])))",
              "legendFormat": "p95 {{model}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (model, le) (rate(ollama_request_duration_seconds_bucket[1m])))",
              "legendFormat": "p99 {{model}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Tokens Generated (tokens/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "rate(ollama_tokens_total[1m])",
            "legendFormat": "{{model}}"
          }]
        },
        {
          "id": 4,
          "title": "Model Load Status",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "ollama_model_loaded",
            "legendFormat": "{{model}}"
          }]
        },
        {
          "id": 5,
          "title": "kbrain CPU Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "100 * (1 - avg by (node_name) (rate(system_cpu_time_seconds_total{state='idle', node_name='kbrain'}[1m])))",
            "legendFormat": "{{node_name}}"
          }]
        },
        {
          "id": 6,
          "title": "kbrain Memory Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "100 * (system_memory_usage_bytes{state='used', node_name='kbrain'} / on(node_name) group_left sum by (node_name) (system_memory_usage_bytes{node_name='kbrain'}))",
            "legendFormat": "{{node_name}}"
          }]
        },
        {
          "id": 7,
          "title": "LLM Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 24 },
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "VictoriaLogs"
          },
          "targets": [{
            "expr": "{layer=\"llm\"}",
            "refId": "A"
          }],
          "options": {
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessages": true
          }
        }
      ],
      "schemaVersion": 38,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "10s",
      "version": 1
    }
    `}}