apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard-llm
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard-llm.json: |
    {{- `
    {
      "uid": "llm",
      "title": "llm hosts",
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{
            "expr": "100 * (1 - avg by (host_name) (rate(system_cpu_time_seconds_total{state='idle', purpose='llm'}[1m])))",
            "legendFormat": "{{host_name}}"
          }]
        },
        {
          "id": 2,
          "title": "Memory Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{
            "expr": "100 * (system_memory_usage_bytes{state='used', purpose='llm'} / on(host_name) group_left sum by (host_name) (system_memory_usage_bytes{purpose='llm'}))",
            "legendFormat": "{{host_name}}"
          }]
        },
        {
          "id": 3,
          "title": "Disk Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "percent" } },
          "targets": [{
            "expr": "100 * (system_filesystem_usage_bytes{state='used', purpose='llm', mountpoint='/'} / on(host_name, mountpoint) sum without(state) (system_filesystem_usage_bytes{purpose='llm', mountpoint='/'}))",
            "legendFormat": "{{host_name}}"
          }]
        },
        {
          "id": 4,
          "title": "Network I/O (bytes/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [
            {
              "expr": "rate(system_network_io_bytes_total{direction='receive', purpose='llm'}[1m])",
              "legendFormat": "rx {{host_name}}"
            },
            {
              "expr": "rate(system_network_io_bytes_total{direction='transmit', purpose='llm'}[1m])",
              "legendFormat": "tx {{host_name}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "LLM Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "VictoriaLogs"
          },
          "targets": [{
            "expr": "{purpose=\"llm\"}",
            "refId": "A"
          }],
          "options": {
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessages": true
          }
        }
      ],
      "schemaVersion": 38,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "10s",
      "version": 1
    }
    `}}