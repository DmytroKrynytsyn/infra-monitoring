apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard-llm
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard-llm.json: |
    {{- `
    {
      "uid": "llm",
      "title": "LLM - kbrain",
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "kbrain CPU Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "100 * (1 - avg by (node_name) (rate(system_cpu_time_seconds_total{state='idle', node_name='debian100'}[1m])))",
            "legendFormat": "cpu"
          }]
        },
        {
          "id": 2,
          "title": "kbrain Memory Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "100 * (system_memory_usage_bytes{state='used', node_name='debian100'} / on(node_name) group_left sum by (node_name) (system_memory_usage_bytes{node_name='debian100'}))",
            "legendFormat": "memory"
          }]
        },
        {
          "id": 3,
          "title": "kbrain Disk Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "100 * (1 - (system_filesystem_usage_bytes{state='free', node_name='debian100', mountpoint='/'} / system_filesystem_usage_bytes{state='reserved', node_name='debian100', mountpoint='/'}))",
            "legendFormat": "disk /"
          }]
        },
        {
          "id": 4,
          "title": "kbrain Network I/O (bytes/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [
            {
              "expr": "rate(system_network_io_bytes_total{direction='receive', node_name='debian100'}[1m])",
              "legendFormat": "rx {{device}}"
            },
            {
              "expr": "rate(system_network_io_bytes_total{direction='transmit', node_name='debian100'}[1m])",
              "legendFormat": "tx {{device}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "LLM Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "VictoriaLogs"
          },
          "targets": [{
            "expr": "{node_name=\"debian100\"}",
            "refId": "A"
          }],
          "options": {
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessages": true
          }
        }
      ],
      "schemaVersion": 38,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "10s",
      "version": 1
    }
    `}}