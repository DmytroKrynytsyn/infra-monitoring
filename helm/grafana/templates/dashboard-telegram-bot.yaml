apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard-telegram-bot
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard-telegram-bot.json: |
    {{ `
    {
      "uid": "telegram-bot",
      "title": "app - telegram-bot-on-llm",
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "LLM Request Rate (req/h)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "sum(increase(llm_request_duration_seconds_count{job=\"telegram-bot-on-llm\"}[1h]))",
            "legendFormat": "requests/h"
          }]
        },
        {
          "id": 2,
          "title": "LLM Average Latency (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "sum(rate(llm_request_duration_seconds_sum{job=\"telegram-bot-on-llm\"}[5m])) / sum(rate(llm_request_duration_seconds_count{job=\"telegram-bot-on-llm\"}[5m]))",
            "legendFormat": "avg latency (s)",
            "refId": "A"
          }]
        },
        {
          "id": 3,
          "title": "Unauthorized Attempts (since restart)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "sum(unauthorized_attempts_total{job=\"telegram-bot-on-llm\"})",
            "legendFormat": "unauthorized attempts",
            "refId": "A"
          }]
        },
        {
          "id": 4,
          "title": "App Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "VictoriaLogs" },
          "targets": [{
            "expr": "{layer=\"app\", namespace=\"telegram-bot-on-llm\"}",
            "refId": "A"
          }],
          "options": {
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessages": true,
            "displayedFields": ["k8s.pod.name", "_msg"]
          }
        }
      ],
      "schemaVersion": 38,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "10s",
      "version": 4
    }
    `}}