apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard-telegram-bot
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard-telegram-bot.json: |
    {{ `
    {
      "uid": "telegram-bot",
      "title": "app - telegram-bot-on-llm",
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "LLM Request Rate (req/h)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "sum(increase(llm_request_duration_seconds_count{job=\"telegram-bot-on-llm\"}[1h]))",
            "legendFormat": "requests/h"
          }]
        },
        {
          "id": 2,
          "title": "LLM Latency p95/p99 (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(llm_request_duration_seconds_bucket{job=\"telegram-bot-on-llm\"}[5m])))",
              "legendFormat": "p95",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(llm_request_duration_seconds_bucket{job=\"telegram-bot-on-llm\"}[5m])))",
              "legendFormat": "p99",
              "refId": "B"
            }
          ]
        },
        {
          "id": 3,
          "title": "Unauthorized Attempts (since restart)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "VictoriaLogs" },
          "targets": [{
            "expr": "count({namespace=\"telegram-bot-on-llm\", layer=\"app\"} | _msg:~\"unauthorized_user\")",
            "refId": "A"
          }],
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "App Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "VictoriaLogs" },
          "targets": [{
            "expr": "{layer=\"app\", namespace=\"telegram-bot-on-llm\"}",
            "refId": "A"
          }],
          "options": {
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessages": true,
            "displayedFields": ["k8s.pod.name", "_msg"]
          }
        }
      ],
      "schemaVersion": 38,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "10s",
      "version": 2
    }
    `}}