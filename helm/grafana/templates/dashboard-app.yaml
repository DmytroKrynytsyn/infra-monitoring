apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard-app
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard-app.json: |
    {
      "uid": "app",
      "title": "App — agents-infra-test",
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "targets": [{
            "expr": "sum(rate(http_requests_total[1m]))",
            "legendFormat": "requests"
          }]
        }
      ],
      "schemaVersion": 38,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "10s",
      "version": 1
    }