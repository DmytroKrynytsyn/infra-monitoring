apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-monitoring-grafana-dashboard-app
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard-app.json: |
    {
      "editable": true,
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [{
            "expr": "sum by (pod, handler, method) (rate(http_requests_total[1m]))",
            "legendFormat": "{{ "{{" }}pod{{ "}}" }} {{ "{{" }}method{{ "}}" }} {{ "{{" }}handler{{ "}}" }}"
          }]
        },
        {
          "id": 2,
          "title": "Latency p99 (seconds)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [{
            "expr": "histogram_quantile(0.99, sum by (pod, handler, le) (rate(http_request_duration_seconds_bucket[1m])))",
            "legendFormat": "{{ "{{" }}pod{{ "}}" }} {{ "{{" }}handler{{ "}}" }}"
          }]
        },
        {
          "id": 3,
          "title": "Error Rate (5xx req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [{
            "expr": "sum by (pod, handler) (rate(http_requests_total{status_code=~\"5..\"}[1m]))",
            "legendFormat": "{{ "{{" }}pod{{ "}}" }} {{ "{{" }}handler{{ "}}" }}"
          }]
        },
        {
          "id": 4,
          "title": "Container Memory Working Set (bytes)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "targets": [{
            "expr": "k8s_pod_memory_working_set_bytes{k8s_namespace_name=\"agents-infra-test\"}",
            "legendFormat": "{{ "{{" }}k8s_pod_name{{ "}}" }}"
          }]
        },
        {
          "id": 5,
          "title": "App Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "VictoriaLogs" },
          "targets": [{ "expr": "{layer=\"app\"}", "refId": "A" }],
          "options": { "showTime": true, "sortOrder": "Descending", "wrapLogMessages": true }
        }
      ],
      "schemaVersion": 38,
      "title": "App — agents-infra-test",
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "10s",
      "version": 1
    }