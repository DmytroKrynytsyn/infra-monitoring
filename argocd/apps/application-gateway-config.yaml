apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DmytroKrynytsyn/infra-monitoring
    targetRevision: HEAD
    path: helm/gateway-config
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true