apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-monitoring-grafana
  namespace: argocd
  labels:
    project: infra-monitoring
    component: grafana
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/DmytroKrynytsyn/infra-monitoring.git
    targetRevision: HEAD
    path: helm/grafana
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true