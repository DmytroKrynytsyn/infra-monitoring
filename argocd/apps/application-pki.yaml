apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DmytroKrynytsyn/infra-monitoring
    targetRevision: HEAD
    path: helm/pki
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true