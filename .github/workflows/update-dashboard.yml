name: Validate Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'helm/grafana/templates/dashboard.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          jq '.data."dashboard.json" | fromjson' helm/grafana/templates/dashboard.yaml