name: Update Dashboard Trigger

on:
  push:
    branches:
      - main
    paths:
      - 'helm/grafana/templates/dashboard.yaml'

jobs:
  update-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update trigger file
        run: |
          echo "Last dashboard update: $(date)" > argocd-sync-trigger.txt

      - name: Commit and push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add argocd-sync-trigger.txt
          git commit -m "Update dashboard sync trigger" || echo "No changes"
          git push